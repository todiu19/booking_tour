spring:
  application:
    name: bookingtour
  datasource:
    url: jdbc:mysql://localhost:3306/booking_tour?useUnicode=true&characterEncoding=UTF-8
    username: root
    password: Tonguyen24@
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    show-sql: true
